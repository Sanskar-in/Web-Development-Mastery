<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E" />
      <stop offset="100%" stop-color="#16213E" />
    </linearGradient>

    <!-- Shield Gradients -->
    <linearGradient id="shield-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5E3A" />
      <stop offset="100%" stop-color="#E44D26" />
    </linearGradient>
    <linearGradient id="shield-right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F16529" />
      <stop offset="100%" stop-color="#E44D26" />
    </linearGradient>

    <!-- Glassmorphism overlay -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>

    <!-- Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#FF5E3A" flood-opacity="0.5"/>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="800" fill="transparent" />

  <!-- Glowing Aura -->
  <circle cx="400" cy="380" r="280" fill="#FF5E3A" opacity="0.15" filter="url(#glow)"/>

  <!-- Shield Base -->
  <g filter="url(#shadow)">
    <!-- Left Half -->
    <polygon points="400,660 200,600 150,150 400,150" fill="url(#shield-left)" />
    <!-- Right Half -->
    <polygon points="400,660 400,150 650,150 600,600" fill="url(#shield-right)" />
  </g>

  <!-- Glass overlay -->
  <polygon points="400,660 200,600 150,150 650,150 600,600" fill="url(#glass)" />

  <!-- The "5" / White highlight -->
  <polygon points="400,220 400,290 300,290 310,380 400,380 400,450 240,450 230,220" fill="#EBEBEB" />
  <polygon points="400,220 570,220 540,510 400,560 400,480 480,450 490,380 400,380 400,290 500,290" fill="#FFFFFF" />

  <!-- Mastery Label -->
  <text x="400" y="740" font-family="'Inter', 'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle" letter-spacing="8" filter="url(#glow)">HTML MASTERY</text>
</svg>
