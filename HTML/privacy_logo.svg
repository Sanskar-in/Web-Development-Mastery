<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#21a852" />
    </linearGradient>
    <linearGradient id="icon-light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#86efac" />
      <stop offset="100%" stop-color="#4ade80" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="800" fill="transparent" />
  <circle cx="400" cy="380" r="280" fill="#4ade80" opacity="0.15" filter="url(#glow)"/>

  <!-- Shield Lock Base -->
  <g filter="url(#shadow)">
    <!-- Shield -->
    <path d="M 400 120 L 650 200 L 650 400 C 650 550 400 680 400 680 C 400 680 150 550 150 400 L 150 200 Z" fill="url(#icon-grad)" />
    <!-- Keyhole -->
    <circle cx="400" cy="350" r="40" fill="#1A1A2E" />
    <path d="M 370 360 L 430 360 L 440 480 L 360 480 Z" fill="#1A1A2E" />
  </g>

  <text x="400" y="740" font-family="'Inter', 'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle" letter-spacing="8" filter="url(#glow)">PRIVACY</text>
</svg>
