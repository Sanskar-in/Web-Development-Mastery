<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#3ecfcf"/>
    </linearGradient>
    <linearGradient id="code" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e0ff"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="url(#bg)" stroke="#ffffff" stroke-width="2"/>
  <!-- Code brackets < / > -->
  <text x="60" y="52" text-anchor="middle" font-family="'Courier New', monospace" font-size="36" font-weight="bold" fill="url(#code)">&lt;/&gt;</text>
  <!-- Name -->
  <text x="60" y="78" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#ffffff" letter-spacing="1">SANSKAR</text>
  <text x="60" y="92" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="8" fill="#c0f0f0" letter-spacing="2">DEVELOPER</text>
