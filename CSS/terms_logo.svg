<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
    <linearGradient id="icon-light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#fbbf24" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="800" fill="transparent" />
  <circle cx="400" cy="380" r="280" fill="#fbbf24" opacity="0.15" filter="url(#glow)"/>

  <!-- Document Base -->
  <g filter="url(#shadow)">
    <!-- Paper -->
    <rect x="250" y="150" width="300" height="400" rx="20" fill="url(#icon-light)" />
    <!-- Fold -->
    <polygon points="550,150 550,250 450,150" fill="url(#icon-grad)" />
    <!-- Lines -->
    <rect x="320" y="280" width="160" height="20" rx="10" fill="url(#icon-grad)" />
    <rect x="320" y="340" width="160" height="20" rx="10" fill="url(#icon-grad)" />
    <rect x="320" y="400" width="100" height="20" rx="10" fill="url(#icon-grad)" />
  </g>

  <text x="400" y="740" font-family="'Inter', 'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle" letter-spacing="8" filter="url(#glow)">TERMS</text>
</svg>
