<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E" />
      <stop offset="100%" stop-color="#16213E" />
    </linearGradient>

    <!-- Icon Gradients -->
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3ecfcf" />
      <stop offset="100%" stop-color="#2a8f8f" />
    </linearGradient>
    <linearGradient id="icon-light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6af2f2" />
      <stop offset="100%" stop-color="#3ecfcf" />
    </linearGradient>

    <!-- Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#3ecfcf" flood-opacity="0.5"/>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="800" fill="transparent" />

  <!-- Glowing Aura -->
  <circle cx="400" cy="380" r="280" fill="#3ecfcf" opacity="0.15" filter="url(#glow)"/>

  <!-- Headset Base -->
  <g filter="url(#shadow)">
    <!-- Headband -->
    <path d="M 250 450 A 150 150 0 0 1 550 450" fill="none" stroke="url(#icon-light)" stroke-width="40" stroke-linecap="round"/>
    <!-- Earpieces -->
    <rect x="210" y="420" width="80" height="120" rx="40" fill="url(#icon-grad)" />
    <rect x="510" y="420" width="80" height="120" rx="40" fill="url(#icon-grad)" />
    <!-- Mic -->
    <path d="M 550 500 C 620 500 620 600 520 600" fill="none" stroke="url(#icon-light)" stroke-width="20" stroke-linecap="round"/>
    <circle cx="510" cy="600" r="25" fill="#FFFFFF" />
  </g>

  <!-- Text -->
  <text x="400" y="740" font-family="'Inter', 'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle" letter-spacing="8" filter="url(#glow)">SUPPORT</text>
</svg>
