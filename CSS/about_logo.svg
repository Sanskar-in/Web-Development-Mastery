<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E" />
      <stop offset="100%" stop-color="#16213E" />
    </linearGradient>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7eb6" />
      <stop offset="100%" stop-color="#d44d8b" />
    </linearGradient>
    <linearGradient id="icon-light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffa8cf" />
      <stop offset="100%" stop-color="#ff7eb6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#ff7eb6" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="800" fill="transparent" />
  <circle cx="400" cy="380" r="280" fill="#ff7eb6" opacity="0.15" filter="url(#glow)"/>

  <!-- Info/User Base -->
  <g filter="url(#shadow)">
    <!-- User Head -->
    <circle cx="400" cy="250" r="100" fill="url(#icon-light)" />
    <!-- User Body -->
    <path d="M 220 580 C 220 450 580 450 580 580 Z" fill="url(#icon-grad)" />
  </g>

  <text x="400" y="740" font-family="'Inter', 'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle" letter-spacing="8" filter="url(#glow)">ABOUT ME</text>
</svg>
